<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Workstation Kit · Coder Addons</title>
<link rel="stylesheet" href="landing.css?v=5" />
<link rel="stylesheet" href="device3d.css?v=5" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="landing-components.jsx?v=6"></script>
<script type="text/babel" src="ai-workstation-components.jsx?v=1"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

function KitApp() {
  const [theme, setTheme] = useState(() => localStorage.getItem('ca-theme') || 'theme-futuristic');
  useEffect(() => { localStorage.setItem('ca-theme', theme); }, [theme]);
  return (
    <div className={'site ' + theme}>
      <div className="bg-ambient" />
      <TopBar theme={theme} setTheme={setTheme} homeHref="index.html" />
      <KitHero />
      <KitFlow />
      <KitComponents />
      <KitWorkflows />
      <KitInBox />
      <KitCTA />
      <FooterCTA />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<KitApp />);
</script>
</body>
</html>
